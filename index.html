<script>
  
const APP_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw_Vhlq9wHwMBBrY0gmzfLSObRzxR_ATE2jonce0aoO38O5xcjbzkG5I1sFhp61NvTQ/exec";

let data =
JSON.parse(localStorage.getItem("sobData")) || [];

const todayKey =
new Date().toLocaleDateString('en-GB');

const savedDate =
localStorage.getItem("sobDate");

if(savedDate !== todayKey){

data = [];

localStorage.removeItem("sobData");

localStorage.setItem("sobDate",todayKey);

}

const tpuEl =
document.getElementById("tpu");

const oeplEl =
document.getElementById("oepl");

const paeplEl =
document.getElementById("paepl");

const totalEl =
document.getElementById("total");

function calc(){

let v = combo.value;

if(!v){
    tpuEl.innerText = 0;
    oeplEl.innerText = 0;
    paeplEl.innerText = 0;
    totalEl.innerText = 0;
    warning.innerText = "";
    return;
}

let p = v.split(",");

let ta = +p[0];
let tc = +p[1];
let o = +p[2];
let pi = +p[3];

let na = p[4] === "NA";

let a =
Math.max(0,+adults.value||0);

let c =
Math.max(0,+children.value||0);

warning.innerText =
(na && c>0)
? "⚠ Children not allowed"
: "";

let tpu =
(a*ta) + (c*tc);

let oepl =
(a+c)*o;

let paepl =
(a+c)*pi;

let total =
tpu + oepl + paepl;

tpuEl.innerText = tpu;
oeplEl.innerText = oepl;
paeplEl.innerText = paepl;
totalEl.innerText = total;
saveFormState();
return {
tpu,
oepl,
paepl,
total
};

}
function saveFormState(){

localStorage.setItem("lastCombo", combo.value);

localStorage.setItem("lastAdults", adults.value);

localStorage.setItem("lastChildren", children.value);

}
function getVendorBreakup(comboName,pax){

function line(items){

return items
.map(i => `${i.name}: ${i.price * pax}`)
.join(" | ");

}

if(comboName.includes("Snow Adventure")){

return `
OEPL → ${line([
{name:"Snow",price:255}
])}
`;

}

else if(comboName.includes("Adventure Combo")){

return `
PAEPL → ${line([
{name:"Gamezone",price:227}
])}
`;

}

else if(comboName.includes("TU Explorer")){

return `
OEPL → ${line([
{name:"Wax",price:70}
])}
<br>
PAEPL → ${line([
{name:"Eyelusion",price:70},
{name:"WOG",price:80}
])}
`;

}

else if(comboName.includes("ECO FUN")){

return `
OEPL → ${line([
{name:"Wax",price:28}
])}
<br>
PAEPL → ${line([
{name:"Mayalok",price:200}
])}
`;

}

else if(comboName.includes("Aastha")){

return `
PAEPL → ${line([
{name:"Gamezone",price:99}
])}
`;

}

else if(comboName.includes("Shiv Ganesha")){

return `
PAEPL → ${line([
{name:"Eyelusion",price:50},
{name:"Gamezone",price:50},
{name:"WOG",price:75}
])}
`;

}

else if(comboName.includes("Namah")){

return `
PAEPL → ${line([
{name:"Gamezone",price:50}
])}
`;

}

else if(comboName.includes("Ultimate Play")){

PAEPL → ${line([
{name:"Gamezone",price:529}

else if(comboName.includes("Viewing Fun")){

<br>
PAEPL → ${line([

else if(comboName.includes("Delight")){

return `

])}
`;

}

else if(comboName.includes("Mini Blast")){

])}

`;

else if(comboName.includes("All in Fun")){

return `
OEPL → ${line([

])}
<br>

}

function saveEntry(){

let raw =
sobInput.value.trim();
let username=document
.getElementById("username")
.value
.trim();

if(username===""){

alert("Enter username");

return;

}
if(!/^[1-9][0-9]{5}$/.test(raw)){

alert(
"Enter valid 6-digit SOB ID"
);

return;

}

let sob =
"SOB000" + raw;

if(data.some(d => d.sob === sob)){

alert(
"This SOB ID already exists"
);

return;

}

let r = calc();

if(!r) return;

let pax =
(+adults.value || 0) +
(+children.value || 0);

let comboName =
combo.options[
combo.selectedIndex
].text;

let breakup=getVendorBreakup(
comboName,
pax
).replace(/<br\s*\/?>/gi,"\n");

data.push({

sob,
...r,

comboName,

adults:
(+adults.value || 0),

children:
(+children.value || 0),

breakup,

time:
new Date().toLocaleTimeString()

});
fetch(APP_SCRIPT_URL,{
    method:"POST",
  headers:{
    "Content-Type":"text/plain"
  },
    body:JSON.stringify({

date:new Date().toLocaleDateString("en-GB"),

username:username,

sob:sob,

comboName:comboName,

adults:+adults.value||0,

children:+children.value||0,

tpu:r.tpu,

oepl:r.oepl,

paepl:r.paepl,

total:r.total,

breakup:breakup.replace(/<br\s*\/?>/gi,"\n"),

time:new Date().toLocaleTimeString()

})
})
.then(r=>r.json())
.then(console.log)
.catch(console.error);

localStorage.setItem(
"sobData",
JSON.stringify(data)
);

localStorage.setItem(
"sobDataBackup",
JSON.stringify(data)
);
localStorage.setItem(
"username",
username
);
render();

sobInput.value = "";

}

function resetForm(){

combo.selectedIndex = 0;

adults.value = "";
children.value = "";
sobInput.value = "";
localStorage.removeItem("lastCombo");

localStorage.removeItem("lastAdults");

localStorage.removeItem("lastChildren");
tpuEl.innerText = 0;
oeplEl.innerText = 0;
paeplEl.innerText = 0;
totalEl.innerText = 0;

warning.innerText = "";

}
async function restoreTodayData(){

    let backup = localStorage.getItem("sobData");

    if(backup){

        data = JSON.parse(backup);

        render();

        return;

    }

    const today =
        new Date().toLocaleDateString("en-GB");

    const res = await fetch(
        APP_SCRIPT_URL +
        "?date=" +
        encodeURIComponent(today)
    );

    const rows = await res.json();

    if(rows.length===0){

        alert("No data found.");

        return;

    }

    data = rows;

    localStorage.setItem(
    "sobData",
    JSON.stringify(rows)
);

    render();

}
function resetAllData(){

if(
!confirm("Delete all saved SOB IDs?")
) return;

localStorage.setItem(
"sobDataBackup",
JSON.stringify(data)
);

data = [];

localStorage.removeItem("sobData");

render();

}

function deleteEntry(index){

if(
!confirm("Delete this SOB ID?")
) return;

data.splice(index,1);

localStorage.setItem(
"sobData",
JSON.stringify(data)
);

localStorage.setItem(
"sobDataBackup",
JSON.stringify(data)
);

render();

}

function editEntry(index){

editingIndex = index;

let d = data[index];

document.getElementById("editSob").value =
d.sob.replace("SOB000","");
document.getElementById("editSob")
.setAttribute("maxlength","6");
document.getElementById("editAdults").value =
d.adults;

document.getElementById("editChildren").value =
d.children;

let parts =
d.time.match(/(\d+):(\d+):(\d+)\s?(AM|PM)?/i);

if(parts){

let mins = parts[2];

let comboSelect =

o.textContent = opt.text;

o.selected = true;
}

comboSelect.appendChild(o);

});

document.getElementById("editModal").style.display =

document.getElementById("editSob").focus();

function formatTime(t){

const d = new Date(`1970-01-01T${t}`);

if(isNaN(d)) return t;

return d.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit",
hour12:true
});

}
