<!DOCTYPE html>
<html>
<head>
<title>SOB coMboS calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; text-align:center; }

.container { margin-top:20px; }

input, select {
  padding:12px;
  margin:8px;
  width:90%;
  max-width:340px;
  font-size:16px;
}

.box { max-width:340px; margin:auto; }

.row {
  display:flex;
  justify-content:space-between;
  font-size:18px;
}

button {
  padding:10px;
  margin:8px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th, td {
  border:1px solid black;
  padding:5px;
}

/* PRINT */
@media print {
  @page { margin:3mm; }

  body * { visibility:hidden; }

  #printArea, #printArea * {
    visibility:visible;
  }

  #printArea {
    position:absolute;
    left:0;
    top:0;
    width:100%;
  }
}

/* 80MM */
#thermal {
  display:none;
  text-align:left;
  font-size:12px;
  padding:5px;
  font-family: monospace; /* 🔥 IMPORTANT */
}

.line { margin:2px 0; }

hr {
  border:0;
  border-top:1px solid #000;
  margin:5px 0;
}

/* HEADER FIX */
.header {
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:5px 0;
}
.header div {
  width:33%;
}
.header .center { text-align:center; }
.header .right { text-align:right; }
.header .left { text-align:left; }
</style>
</head>

<body>

<h2>SOB Combos Calculator</h2>

<div class="container">

<select id="combo" onchange="resetAndCalc()">
<option value="">Select Combo</option>

<option value="170,80,70,150">390/300 TU Explorer Combo</option>
      <option value="170,80,0,227">397/307 Adventure Combo</option>
      <option value="170,80,28,200">398/308 ECO FUN Combo</option>
      <option value="170,80,255,0">425/335 Snow Adventure Combo</option>
      <option value="400,300,0,99">499/399 Aastha Combo</option>
      <option value="370,180,0,175">545/355 Shiv Ganesha Combo</option>
      <option value="550,375,0,50">600/425 Namah Combo</option>
      <option value="170,170,0,529,NA">699/NA Ultimate Play Combo</option>
      <option value="370,180,325,50">745/555 Viewing Fun Combo</option>
      <option value="550,375,249,170">969/794 Symbolic Combo</option>
      <option value="170,80,355,574">1099/1009 Delight Combo</option>
      <option value="370,180,355,574">1299/1109 Mini Blast Combo</option>
      <option value="550,375,250,599">1399/1224 All in Fun Combo</option>
      <option value="1350,775,0,150">1500/925 Divine Rush Combo</option>
      <option value="1400,1400,449,2350,NA">4199/NA Ultimate Mega Combo</option>

</select>

<br>

<input type="number" id="adults" placeholder="Adults" oninput="calc()">
<input type="number" id="children" placeholder="Children" oninput="calc()">

<p id="warning" style="color:red;"></p>

<div class="box">
<div class="row"><span>TPU</span><span id="tpu">0</span></div>
<div class="row"><span>OEPL</span><span id="oepl">0</span></div>
<div class="row"><span>PAEPL</span><span id="paepl">0</span></div>
<hr>
<div class="row"><b>Total</b><span id="total">0</span></div>
</div>

<br>

<input type="tel" id="sobInput" placeholder="Enter SOB ID">

<br>

<button onclick="saveEntry()">Save SOB</button>
<button onclick="resetForm()">Reset Calculator</button>
<button onclick="resetAllData()">Reset SOB IDs</button>

<button onclick="printA4()">Print A4</button>
<button onclick="print80()">Print 80mm</button>

</div>

<!-- PRINT AREA -->
<div id="printArea">

<!-- A4 -->
<div id="a4">

<div class="header">
  <div class="left">POS # ______</div>
  <div class="center">USERNA<b>M</b>E.<b>S</b></div>
  <div class="right">DATE: <span id="date"></span></div>
</div>

<table>
<thead>
<tr>
<th>SR</th>
<th>SOB ID</th>
<th>TPU</th>
<th>OEPL</th>
<th>PAEPL</th>
<th>TOTAL</th>
<th>TIME</th>
</tr>
</thead>

<tbody id="dataBody"></tbody>

<tfoot>
<tr>
<td colspan="2"><b>TOTAL</b></td>
<td id="tpuT"></td>
<td id="oeplT"></td>
<td id="paeplT"></td>
<td id="grandT"></td>
<td></td>
</tr>
</tfoot>
</table>

</div>

<!-- 80MM -->
<div id="thermal">

<div class="line"><b>SOB SPLIT PAYMENTS</b></div>
<hr>

<div class="line">POS# : ______</div>
<div class="line">USERNA<b>M</b>E.<b>S</b> : ________</div>
<div class="line">DATE : <span id="date2"></span></div>

<hr>

<div class="line"><b>SR  SOB ID (TOTAL)</b></div>
<div class="line"><b>TPU | OEPL | PAEPL</b></div>

<hr>

<div id="thermalData"></div>

<hr>

<div class="line">TOTAL TPU : <span id="tpuT2"></span></div>
<div class="line">TOTAL OEPL : <span id="oeplT2"></span></div>
<div class="line">TOTAL PAEPL : <span id="paeplT2"></span></div>

<hr>

<div class="line"><b>GRAND TOTAL : <span id="grandT2"></span></b></div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("sobData")) || [];

function resetAndCalc(){
adults.value="";
children.value="";
calc();
}

function calc(){

let v = combo.value;
if(!v) return;

let p = v.split(",");

let ta = +p[0];
let tc = +p[1];
let o  = +p[2];
let pi = +p[3];
let na = p[4]==="NA";

let a = +adults.value || 0;
let c = +children.value || 0;

if(na && c>0){
warning.innerText = "⚠ Children not allowed";
} else {
warning.innerText = "";
}

let tpu = a*ta + c*tc;
let oepl = (a+c)*o;
let paepl = (a+c)*pi;
let total = tpu + oepl + paepl;

document.getElementById("tpu").innerText = tpu;
document.getElementById("oepl").innerText = oepl;
document.getElementById("paepl").innerText = paepl;
document.getElementById("total").innerText = total;

return {tpu,oepl,paepl,total};
}

function saveEntry(){

let raw = sobInput.value.replace(/\D/g,'');
if(raw.length<6 || raw.length>7){
alert("Invalid SOB ID");
return;
}

let r = calc();
if(!r) return;

let sob = "SOB000" + raw;
let time = new Date().toLocaleTimeString();

data.push({sob,...r,time});
localStorage.setItem("sobData",JSON.stringify(data));

render();
sobInput.value="";
}

function resetForm(){
adults.value="";
children.value="";
sobInput.value="";
tpu.innerText=0;
oepl.innerText=0;
paepl.innerText=0;
total.innerText=0;
warning.innerText="";
}

function resetAllData(){
if(!confirm("Delete all?")) return;
data=[];
localStorage.removeItem("sobData");
render();
}

function render(){

let body = dataBody;
body.innerHTML="";

let t1=0,t2=0,t3=0,t4=0;

let th="";

data.forEach((d,i)=>{

body.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${d.sob}</td>
<td>${d.tpu}</td>
<td>${d.oepl}</td>
<td>${d.paepl}</td>
<td>${d.total}</td>
<td>${d.time}</td>
</tr>`;

th += `
<div class="line">--------------------------------</div>
<div class="line">${i+1}. ${d.sob} (${d.total})</div>
<div class="line">TPU:${d.tpu} | OEPL:${d.oepl} | PAEPL:${d.paepl}</div>
`;

t1+=d.tpu;
t2+=d.oepl;
t3+=d.paepl;
t4+=d.total;

});

tpuT.innerText=t1;
oeplT.innerText=t2;
paeplT.innerText=t3;
grandT.innerText=t4;

thermalData.innerHTML = th;

tpuT2.innerText=t1;
oeplT2.innerText=t2;
paeplT2.innerText=t3;
grandT2.innerText=t4;
}

function printA4(){
a4.style.display="block";
thermal.style.display="none";
window.print();
}

function print80(){
a4.style.display="none";
thermal.style.display="block";
window.print();
}

date.innerText = new Date().toLocaleDateString();
date2.innerText = new Date().toLocaleDateString();

render();

</script>

</body>
</html>
