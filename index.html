<script>

let data =
JSON.parse(localStorage.getItem("sobData")) || [];

const todayKey =
new Date().toLocaleDateString('en-GB');

const savedDate =
localStorage.getItem("sobDate");

if(savedDate !== todayKey){

data = [];

localStorage.removeItem("sobData");

localStorage.setItem("sobDate",todayKey);

}

const tpuEl =
document.getElementById("tpu");

const oeplEl =
document.getElementById("oepl");

const paeplEl =
document.getElementById("paepl");

const totalEl =
document.getElementById("total");

function calc(){

let v = combo.value;

if(!v) return;

let p = v.split(",");

let ta = +p[0];
let tc = +p[1];
let o = +p[2];
let pi = +p[3];

let na = p[4] === "NA";

let a =
Math.max(0,+adults.value||0);

let c =
Math.max(0,+children.value||0);

warning.innerText =
(na && c>0)
? "⚠ Children not allowed"
: "";

let tpu =
(a*ta) + (c*tc);

let oepl =
(a+c)*o;

let paepl =
(a+c)*pi;

let total =
tpu + oepl + paepl;

tpuEl.innerText = tpu;
oeplEl.innerText = oepl;
paeplEl.innerText = paepl;
totalEl.innerText = total;
saveFormState();
return {
tpu,
oepl,
paepl,
total
};

}
function saveFormState(){

localStorage.setItem("lastCombo", combo.value);

localStorage.setItem("lastAdults", adults.value);

localStorage.setItem("lastChildren", children.value);

}

function saveEntry(){

let raw =
sobInput.value.trim();

if(!/^[1-9][0-9]{5}$/.test(raw)){

alert(
"Enter valid 6-digit SOB ID"
);

return;

}

let sob =
"SOB000" + raw;

if(data.some(d => d.sob === sob)){

alert(
"This SOB ID already exists"
);

return;

}

let r = calc();

if(!r) return;

let pax =
(+adults.value || 0) +
(+children.value || 0);

let comboName =
combo.options[
combo.selectedIndex
].text;

let breakup =
getVendorBreakup(comboName,pax);

data.push({

sob,
...r,

comboName,

adults:
(+adults.value || 0),

children:
(+children.value || 0),

breakup,

time:
new Date().toLocaleTimeString()

});

localStorage.setItem(
"sobData",
JSON.stringify(data)
);

render();

sobInput.value = "";

}

function resetForm(){

combo.selectedIndex = 0;

adults.value = "";
children.value = "";
sobInput.value = "";
localStorage.removeItem("lastCombo");

localStorage.removeItem("lastAdults");

localStorage.removeItem("lastChildren");
tpuEl.innerText = 0;
oeplEl.innerText = 0;
paeplEl.innerText = 0;
totalEl.innerText = 0;

warning.innerText = "";

}

function resetAllData(){

if(
!confirm(
"Delete all saved SOB IDs?"
)
) return;

data = [];

localStorage.removeItem(
"sobData"
);

render();

}

function deleteEntry(index){

if(
!confirm("Delete this SOB ID?")
) return;

data.splice(index,1);

localStorage.setItem(
"sobData",
JSON.stringify(data)
);

render();

}
function formatTime(t){

let d = new Date("1970-01-01 " + t);

return d.toLocaleTimeString([], {
hour: '2-digit',
minute: '2-digit',
hour12: true
});

}
function render(){

dataBody.innerHTML = "";

let totalAll = 0;
let tpuSum = 0;
let oeplSum = 0;
let paeplSum = 0;
let oeplActivities = {};
let paeplActivities = {};

data.forEach((d,i)=>{

dataBody.innerHTML += `

<tr>

<td>${i+1}</td>

<td>
<b>${d.sob}</b>
<br>
<span style="font-size:9px;white-space:nowrap;">
(${d.comboName.match(/\d+\/(?:\d+|NA)/)?.[0] || ""})
(${d.adults}.A + ${d.children}.C)
</span>
</td>

<td>${d.tpu}</td>
<td>${d.oepl}</td>
<td>${d.paepl}</td>
<td>${d.total}</td>

<td class="deleteColumn">
<button class="deleteBtn" onclick="deleteEntry(${i})">X</button>
</td>

<td class="activityCell">
${d.breakup}
</td>

<td style="font-size:10px;">
${formatTime(d.time)}
</td>

</tr>

`;

tpuSum += d.tpu;
oeplSum += d.oepl;
paeplSum += d.paepl;
totalAll += d.total;

// Activity totals calculation

let tempDiv = document.createElement("div");
tempDiv.innerHTML = d.breakup;

let text = tempDiv.innerText.split("\n");

text.forEach(line => {

line = line.trim();

if(line.startsWith("OEPL")){

let activities = line.replace("OEPL →","").split("|");

activities.forEach(a=>{

let parts = a.split(":");

if(parts.length < 2) return;

let name = parts[0].trim();

let value = parseInt(parts[1]) || 0;

oeplActivities[name] =
(oeplActivities[name] || 0) + value;

});

}

if(line.startsWith("PAEPL")){

let activities = line.replace("PAEPL →","").split("|");

activities.forEach(a=>{

let parts = a.split(":");

if(parts.length < 2) return;

let name = parts[0].trim();

let value = parseInt(parts[1]) || 0;

paeplActivities[name] =
(paeplActivities[name] || 0) + value;

});

}

});

});


function formatActivities(obj){

return Object.entries(obj)
.map(([k,v]) => `${k}: ${v}`)
.join(" | ");

}

grandT.innerHTML = "<b>" + totalAll + "</b>";
tpuT.innerHTML = "<b>" + tpuSum + "</b>";
oeplT.innerHTML = "<b>" + oeplSum + "</b>";
paeplT.innerHTML = "<b>" + paeplSum + "</b>";

activityTotals.innerHTML = `

OEPL → ${formatActivities(oeplActivities)}

<br>

PAEPL → ${formatActivities(paeplActivities)}

`;

}

data.forEach((d,i)=>{

tpuSum += d.tpu;
oeplSum += d.oepl;
paeplSum += d.paepl;
totalAll += d.total;

addActivityTotals(d.breakup);

html += `

<div class="entry">

<div class="smallRow">

<div>
${i+1}) [${d.comboName.match(/\d+\/(?:\d+|NA)/)?.[0] || ""}]
</div>

<div>
[${d.adults}A + ${d.children}C]
</div>

<div>
[${formatTime(d.time)}]
</div>

</div>

<div class="topRow">
${d.sob}
</div>

<table class="amountTable">

<tr>
<td>TPU</td>
<td>OEPL</td>
<td>PAEPL</td>
<td>TOTAL</td>
</tr>

<tr>
<td>${d.tpu}</td>
<td>${d.oepl}</td>
<td>${d.paepl}</td>
<td>${d.total}</td>
</tr>

</table>

<div class="activity">
${formatActivityText(d.breakup)}
</div>

</div>

`;

});

html += `

<div class="doubleLine"></div>
<div class="doubleLine"></div>

<table class="summaryTable">

<tr>
<td class="summaryHead" colspan="4">
GRAND TOTAL
</td>
</tr>

<tr>
<td>TOTAL TPU</td>
<td>TOTAL OEPL</td>
<td>TOTAL PAEPL</td>
<td>GRAND TOTAL</td>
</tr>

<tr>
<td>${tpuSum}</td>
<td>${oeplSum}</td>
<td>${paeplSum}</td>
<td>${totalAll}</td>
</tr>

</table>

<table class="summaryTable">

<tr>
<td class="summaryHead" colspan="4">
OEPL ACTIVITIES TOTAL
</td>
</tr>

<tr>
${Object.entries(oeplActivities).map(([k,v])=>{

let vendor = "";

if(k==="Wax") vendor="Victory";
if(k==="Snow") vendor="Shrinathji Ent";
if(k==="Food") vendor="Foods";
if(k==="Souvenir") vendor="Mayan";

return `<td>${k}<br>(${vendor})</td>`;

}).join("")}
</tr>

<tr>
${Object.entries(oeplActivities).map(([k,v])=>`
<td>${v}</td>
`).join("")}
</tr>

</table>

<table class="summaryTable">

<tr>
<td class="summaryHead" colspan="4">
PAEPL ACTIVITIES TOTAL
</td>
</tr>

<tr>
${Object.entries(paeplActivities).map(([k,v])=>{

let vendor = "";

if(k==="Mayalok") vendor="Divine";
if(k==="Eyelusion") vendor="Rinz";
if(k==="Gamezone") vendor="Saachi";
if(k==="WOG") vendor="Mahadev";

return `<td>${k}<br>(${vendor})</td>`;

}).join("")}
</tr>

<tr>
${Object.entries(paeplActivities).map(([k,v])=>`
<td>${v}</td>
`).join("")}
</tr>

</table>

`;

let printWindow = window.open('', '_blank');

printWindow.document.open();

printWindow.document.write(html);

printWindow.document.close();

setTimeout(()=>{

printWindow.focus();

printWindow.print();

},700);

}
restoreFormState();
setDate();

render();

</script>

</body>

</html>
