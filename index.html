<script>

let data =
JSON.parse(localStorage.getItem("sobData")) || [];

const todayKey =
new Date().toLocaleDateString('en-GB');

const savedDate =
localStorage.getItem("sobDate");

if(savedDate !== todayKey){

data = [];

localStorage.removeItem("sobData");

localStorage.setItem("sobDate",todayKey);

}

const tpuEl =
document.getElementById("tpu");

const oeplEl =
document.getElementById("oepl");

const paeplEl =
document.getElementById("paepl");

const totalEl =
document.getElementById("total");

function calc(){

let v = combo.value;

if(!v) return;

let p = v.split(",");

let ta = +p[0];
let tc = +p[1];
let o = +p[2];
let pi = +p[3];

let na = p[4] === "NA";

let a =
Math.max(0,+adults.value||0);

let c =
Math.max(0,+children.value||0);

warning.innerText =
(na && c>0)
? "⚠ Children not allowed"
: "";

let tpu =
(a*ta) + (c*tc);

let oepl =
(a+c)*o;

let paepl =
(a+c)*pi;

let total =
tpu + oepl + paepl;

tpuEl.innerText = tpu;
oeplEl.innerText = oepl;
paeplEl.innerText = paepl;
totalEl.innerText = total;
saveFormState();
return {
tpu,
oepl,
paepl,
total
};

}
function saveFormState(){

localStorage.setItem("lastCombo", combo.value);

localStorage.setItem("lastAdults", adults.value);

localStorage.setItem("lastChildren", children.value);

}

function saveEntry(){

let raw =
sobInput.value.trim();

if(!/^[1-9][0-9]{5}$/.test(raw)){

alert(
"Enter valid 6-digit SOB ID"
);

return;

}

let sob =
"SOB000" + raw;

if(data.some(d => d.sob === sob)){

alert(
"This SOB ID already exists"
);

return;

}

let r = calc();

if(!r) return;

let pax =
(+adults.value || 0) +
(+children.value || 0);

let comboName =
combo.options[
combo.selectedIndex
].text;

let breakup =
getVendorBreakup(comboName,pax);

data.push({

sob,
...r,

comboName,

adults:
(+adults.value || 0),

children:
(+children.value || 0),

breakup,

time:
new Date().toLocaleTimeString()

});

localStorage.setItem(
"sobData",
JSON.stringify(data)
);

render();

sobInput.value = "";

}

function resetForm(){

combo.selectedIndex = 0;

tpuEl.innerText = 0;
oeplEl.innerText = 0;
paeplEl.innerText = 0;
totalEl.innerText = 0;

warning.innerText = "";

}

if(
!confirm(
"Delete all saved SOB IDs?"
)

render();

}

function deleteEntry(index){

if(
!confirm("Delete this SOB ID?")
) return;

data.splice(index,1);

localStorage.setItem(
"sobData",
JSON.stringify(data)
);

render();

}

function editEntry(index){

let d = data[index];

let newSob = prompt(
"Edit SOB ID (6 digits)",
d.sob.replace("SOB000","")
);

if(newSob === null) return;

if(!/^[1-9][0-9]{5}$/.test(newSob)){
alert("Invalid SOB ID");
return;
}

let newAdults = prompt(
"Adults Count",
d.adults
);

if(newAdults === null) return;

let newChildren = prompt(
"Children Count",
d.children
);

if(newChildren === null) return;

let newTime = prompt(
"Time",
d.time
);

if(newTime === null) return;

let comboNames =
Array.from(combo.options)
.slice(1)
.map((o,i)=>`${i+1}. ${o.text}`)
.join("\n");

let comboChoice = prompt(
"Select Combo Number:\n\n" + comboNames,
1
);

if(comboChoice === null) return;

let comboIndex = parseInt(comboChoice);

if(
isNaN(comboIndex) ||
comboIndex < 1 ||
comboIndex >= combo.options.length
){
alert("Invalid Combo");
return;
}

let comboOption =
combo.options[comboIndex];

let comboValue =
comboOption.value.split(",");

let ta = +comboValue[0];
let tc = +comboValue[1];
let oepl = +comboValue[2];
let paepl = +comboValue[3];

let adultsCount = +newAdults || 0;
let childrenCount = +newChildren || 0;

let tpu =
(adultsCount * ta) +
(childrenCount * tc);

let oeplAmt =
(adultsCount + childrenCount) * oepl;

let paeplAmt =
(adultsCount + childrenCount) * paepl;

let total =
tpu + oeplAmt + paeplAmt;

let pax =
adultsCount + childrenCount;

data[index] = {
...data[index],
sob: "SOB000" + newSob,
comboName: comboOption.text,
adults: adultsCount,
children: childrenCount,
tpu: tpu,
oepl: oeplAmt,
paepl: paeplAmt,
total: total,
breakup: getVendorBreakup(comboOption.text,pax),
time: newTime
};

localStorage.setItem(
"sobData",
JSON.stringify(data)
);

render();
}

function formatTime(t){

let d = new Date("1970-01-01 " + t);

return d.toLocaleTimeString([], {
hour: '2-digit',
minute: '2-digit',
hour12: true
});

}
function render(){

dataBody.innerHTML = "";

let totalAll = 0;
let tpuSum = 0;
let oeplSum = 0;
let paeplSum = 0;
let oeplActivities = {};
let paeplActivities = {};

data.forEach((d,i)=>{

dataBody.innerHTML += `

<tr>

<td class="editColumn">
<button class="editBtn" onclick="editEntry(${i})">✏️</button>
</td>

<td class="deleteColumn">
<button class="deleteBtn" onclick="deleteEntry(${i})">X</button>
</td>

<td>${i+1}</td>

<td>
<b>${d.sob}</b>
<br>
<span style="font-size:9px;white-space:nowrap;">
(${d.comboName.match(/\d+\/(?:\d+|NA)/)?.[0] || ""})
(${d.adults}.A + ${d.children}.C)
</span>
</td>

<td>${d.tpu}</td>
<td>${d.oepl}</td>
<td>${d.paepl}</td>
<td>${d.total}</td>

<td class="activityCell">
${d.breakup}
</td>

<td style="font-size:10px;">
${formatTime(d.time)}
</td>

</tr>

`;

tpuSum += d.tpu;
oeplSum += d.oepl;
paeplSum += d.paepl;
totalAll += d.total;

// Activity totals calculation

let tempDiv = document.createElement("div");
tempDiv.innerHTML = d.breakup;

let text = tempDiv.innerText.split("\n");

text.forEach(line => {

line = line.trim();

if(line.startsWith("OEPL")){

let activities = line.replace("OEPL →","").split("|");

activities.forEach(a=>{

let parts = a.split(":");

if(parts.length < 2) return;

let name = parts[0].trim();

let value = parseInt(parts[1]) || 0;

oeplActivities[name] =
(oeplActivities[name] || 0) + value;

});

}

if(line.startsWith("PAEPL")){

let activities = line.replace("PAEPL →","").split("|");

activities.forEach(a=>{

let parts = a.split(":");

if(parts.length < 2) return;

let name = parts[0].trim();

let value = parseInt(parts[1]) || 0;

paeplActivities[name] =
(paeplActivities[name] || 0) + value;

});

}

});

});

function formatActivities(obj){

return Object.entries(obj)
.map(([k,v]) => `${k}: ${v}`)
.join(" | ");

}

grandT.innerHTML = "<b>" + totalAll + "</b>";
tpuT.innerHTML = "<b>" + tpuSum + "</b>";
oeplT.innerHTML = "<b>" + oeplSum + "</b>";
paeplT.innerHTML = "<b>" + paeplSum + "</b>";

activityTotals.innerHTML = `

OEPL → ${formatActivities(oeplActivities)}

<br>

PAEPL → ${formatActivities(paeplActivities)}

`;

}

let tempDiv = document.createElement("div");
